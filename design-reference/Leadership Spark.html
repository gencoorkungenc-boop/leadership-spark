<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Leadership Spark</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..500,30..100;1,9..144,300..500,30..100&family=EB+Garamond:ital,wght@0,400..500;1,400..500&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  html, body {
    margin: 0; padding: 0;
    background: #1a1410;
    min-height: 100vh;
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  * { box-sizing: border-box; }

  @keyframes sparkFadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes sparkNudge {
    0%, 100% { transform: translateY(0); opacity: 0.7; }
    50%      { transform: translateY(3px); opacity: 1; }
  }
  @keyframes sparkPulse {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50%      { opacity: 1;   transform: scale(1.08); }
  }

  /* Stage */
  .stage {
    min-height: 100vh;
    display: flex; align-items: flex-start; justify-content: center;
    padding: 48px 20px;
    background:
      radial-gradient(1200px 800px at 20% 0%, rgba(255, 210, 160, 0.04), transparent 60%),
      radial-gradient(900px 600px at 90% 100%, rgba(255, 180, 140, 0.03), transparent 60%),
      #1a1410;
  }

  /* On mobile, full bleed — no device frame */
  @media (max-width: 700px) {
    .stage { padding: 0; background: #fdfaf4; }
    .device-wrap { display: none; }
    .bleed-wrap { display: block !important; }
  }
  .bleed-wrap { display: none; }

  /* Tweaks panel */
  .tweaks-panel {
    position: fixed; bottom: 20px; right: 20px;
    background: #fdfaf4; border: 1px solid rgba(55,45,35,0.12);
    border-radius: 3px;
    padding: 16px 18px; width: 240px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3), 0 4px 12px rgba(0,0,0,0.15);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 12px; color: #2a201a;
    z-index: 1000;
    display: none;
  }
  .tweaks-panel.visible { display: block; }
  .tweaks-panel h4 {
    margin: 0 0 12px; font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 1.6px; text-transform: uppercase;
    color: rgba(55,45,35,0.5); font-weight: 400;
  }
  .tweak-row { margin-bottom: 12px; }
  .tweak-row label {
    display: block; margin-bottom: 6px;
    font-size: 11px; color: rgba(55,45,35,0.7);
  }
  .tweak-swatches { display: flex; gap: 6px; }
  .tweak-sw {
    width: 22px; height: 22px; border-radius: 50%;
    border: 1px solid rgba(55,45,35,0.15); cursor: pointer;
    padding: 0; appearance: none;
    transition: transform 180ms;
  }
  .tweak-sw.active { transform: scale(1.15); box-shadow: 0 0 0 1.5px #2a201a; }
  .tweak-select {
    width: 100%; padding: 6px 8px; font-size: 12px;
    border: 1px solid rgba(55,45,35,0.15);
    background: white; font-family: inherit; color: inherit;
    border-radius: 2px;
  }
  .tweak-check {
    display: flex; align-items: center; gap: 8px; cursor: pointer;
    font-size: 12px;
  }

  /* iOS frame centering */
  .device-wrap {
    display: flex; flex-direction: column; align-items: center; gap: 14px;
  }
  .device-label {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 1.4px; text-transform: uppercase;
    color: rgba(255, 240, 220, 0.35);
  }
</style>
</head>
<body>

<div id="root"></div>

<!-- Tweaks panel (vanilla, not React — simpler) -->
<div id="tweaks-panel" class="tweaks-panel">
  <h4>Tweaks</h4>
  <div class="tweak-row">
    <label>Accent</label>
    <div class="tweak-swatches" id="tw-accents"></div>
  </div>
  <div class="tweak-row">
    <label>Serif</label>
    <select class="tweak-select" id="tw-serif">
      <option value="Fraunces">Fraunces</option>
      <option value="EB Garamond">EB Garamond</option>
    </select>
  </div>
  <div class="tweak-row">
    <label>Card layout</label>
    <select class="tweak-select" id="tw-layout">
      <option value="numbered">Numbered hairline (default)</option>
      <option value="boxed">Boxed</option>
    </select>
  </div>
  <div class="tweak-row">
    <label class="tweak-check">
      <input type="checkbox" id="tw-mark"/>
      Show spark mark in nav
    </label>
  </div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="frames/ios-frame.jsx"></script>
<script type="text/babel" src="components/home.jsx"></script>

<script type="text/babel">
  function App() {
    const [tweaks, setTweaks] = React.useState(window.TWEAK_DEFAULS);

    // Edit-mode protocol
    React.useEffect(() => {
      const handler = (e) => {
        if (!e.data || typeof e.data !== 'object') return;
        if (e.data.type === '__activate_edit_mode') {
          document.getElementById('tweaks-panel').classList.add('visible');
        } else if (e.data.type === '__deactivate_edit_mode') {
          document.getElementById('tweaks-panel').classList.remove('visible');
        }
      };
      window.addEventListener('message', handler);
      window.parent.postMessage({ type: '__edit_mode_available' }, '*');
      return () => window.removeEventListener('message', handler);
    }, []);

    // Wire up tweaks UI <-> state
    React.useEffect(() => {
      const panel = document.getElementById('tweaks-panel');
      const accentsEl = document.getElementById('tw-accents');
      const serifEl = document.getElementById('tw-serif');
      const layoutEl = document.getElementById('tw-layout');
      const markEl = document.getElementById('tw-mark');

      // Render swatches
      accentsEl.innerHTML = '';
      Object.entries(window.ACCENTS).forEach(([key, val]) => {
        const b = document.createElement('button');
        b.className = 'tweak-sw' + (tweaks.accent === key ? ' active' : '');
        b.style.background = `oklch(0.64 0.13 ${val.hue})`;
        b.title = val.name;
        b.onclick = () => update({ accent: key });
        accentsEl.appendChild(b);
      });
      serifEl.value = tweaks.serif;
      layoutEl.value = tweaks.layout;
      markEl.checked = tweaks.showMark;

      serifEl.onchange = () => update({ serif: serifEl.value });
      layoutEl.onchange = () => update({ layout: layoutEl.value });
      markEl.onchange = () => update({ showMark: markEl.checked });

      function update(patch) {
        const next = { ...tweaks, ...patch };
        setTweaks(next);
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: patch }, '*');
      }
    }, [tweaks]);

    // Detect mobile viewport
    const [isMobile, setIsMobile] = React.useState(
      typeof window !== 'undefined' && window.innerWidth <= 700
    );
    React.useEffect(() => {
      const onR = () => setIsMobile(window.innerWidth <= 700);
      window.addEventListener('resize', onR);
      return () => window.removeEventListener('resize', onR);
    }, []);

    const page = <window.HomePage tweaks={tweaks} />;

    if (isMobile) {
      return <div style={{ minHeight: '100vh', background: '#fdfaf4' }}>{page}</div>;
    }

    return (
      <div className="stage">
        <div className="device-wrap">
          <window.IOSDevice width={390} height={844}>
            <div style={{ paddingTop: 44, height: '100%', overflow: 'auto' }}>
              {page}
            </div>
          </window.IOSDevice>
          <div className="device-label">Leadership Spark — Mobile home</div>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
